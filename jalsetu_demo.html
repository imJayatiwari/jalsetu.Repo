<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>JalSetu — Water Sharing & Tracking Network</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>body{margin:0;padding:24px;background:#EDE7D8;font-family:system-ui,sans-serif;}</style>
</head>
<body>
<div id="jalsetu-root"></div>
<style>
  #jalsetu-root {
    --ink: #1B2E35;
    --clay: #C76B3F;
    --water: #2C7DA0;
    --water-deep: #14506B;
    --sand: #F6F0E4;
    --leaf: #4F7942;
    --line: #D9CFBB;
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--sand);
    color: var(--ink);
    border-radius: 16px;
    overflow: hidden;
    max-width: 880px;
    margin: 0 auto;
  }
  #jalsetu-root * { box-sizing: border-box; }
  .js-header {
    background: linear-gradient(135deg, var(--water-deep), var(--water));
    color: white;
    padding: 28px 32px 22px;
    position: relative;
  }
  .js-eyebrow {
    font-size: 11px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    opacity: 0.85;
    font-weight: 600;
  }
  .js-title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 32px;
    margin: 4px 0 2px;
    font-weight: 700;
  }
  .js-sub { font-size: 14px; opacity: 0.9; max-width: 520px; line-height: 1.5; }
  .js-tabs {
    display: flex;
    background: white;
    border-bottom: 1px solid var(--line);
  }
  .js-tab {
    flex: 1;
    padding: 14px 8px;
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #8a8170;
    cursor: pointer;
    border-bottom: 3px solid transparent;
    transition: all .15s;
  }
  .js-tab.active { color: var(--water-deep); border-bottom-color: var(--clay); }
  .js-tab:hover { background: #fafafa; }
  .js-panel { padding: 24px 32px 32px; min-height: 380px; }
  .js-panel.hidden { display: none; }

  /* Map panel */
  .js-source-card {
    display: flex;
    align-items: center;
    gap: 14px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .js-status-dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .js-status-dot.ok { background: var(--leaf); }
  .js-status-dot.low { background: #D6A04A; }
  .js-status-dot.dry { background: #B23A2E; }
  .js-source-name { font-weight: 600; font-size: 14.5px; }
  .js-source-meta { font-size: 12.5px; color: #6b6256; margin-top: 2px; }
  .js-source-dist { margin-left: auto; font-size: 12.5px; color: var(--water-deep); font-weight: 600; white-space: nowrap; }
  .js-add-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: var(--clay);
    color: white;
    border: none;
    padding: 10px 18px;
    border-radius: 8px;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    margin-top: 12px;
  }
  .js-add-btn:hover { background: #b35d34; }

  /* Ledger panel */
  .js-ledger-form {
    background: white;
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 18px;
  }
  .js-form-row { display: flex; gap: 10px; margin-bottom: 10px; flex-wrap: wrap; }
  .js-form-row input, .js-form-row select {
    flex: 1;
    min-width: 110px;
    padding: 9px 10px;
    border: 1px solid var(--line);
    border-radius: 7px;
    font-size: 13.5px;
    font-family: inherit;
  }
  .js-toggle-group { display: flex; gap: 8px; }
  .js-toggle {
    flex: 1;
    padding: 9px;
    text-align: center;
    border: 1px solid var(--line);
    border-radius: 7px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
    color: #8a8170;
  }
  .js-toggle.sel-lend { background: #E8F0E3; border-color: var(--leaf); color: var(--leaf); }
  .js-toggle.sel-borrow { background: #FBE9E2; border-color: var(--clay); color: var(--clay); }
  .js-entry {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 0;
    border-bottom: 1px solid var(--line);
  }
  .js-entry:last-child { border-bottom: none; }
  .js-entry-icon {
    width: 36px; height: 36px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 16px; flex-shrink: 0;
  }
  .js-entry-icon.lend { background: #E8F0E3; }
  .js-entry-icon.borrow { background: #FBE9E2; }
  .js-entry-text { font-size: 14px; }
  .js-entry-text b { font-weight: 700; }
  .js-entry-date { font-size: 11.5px; color: #948b7d; margin-top: 2px; }
  .js-entry-amt { margin-left: auto; font-weight: 700; font-size: 14px; white-space: nowrap; }
  .js-entry-amt.lend { color: var(--leaf); }
  .js-entry-amt.borrow { color: var(--clay); }
  .js-balance-banner {
    background: var(--water-deep);
    color: white;
    border-radius: 12px;
    padding: 16px 18px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .js-balance-label { font-size: 12.5px; opacity: 0.85; text-transform: uppercase; letter-spacing: 0.05em; }
  .js-balance-num { font-size: 22px; font-weight: 700; font-family: Georgia, serif; }
  .js-empty { text-align: center; padding: 30px 10px; color: #948b7d; font-size: 13.5px; }
  .js-section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; color: #6b6256; margin: 0 0 12px; }
</style>

<script>
(function(){
  const root = document.getElementById('jalsetu-root');

  const sources = [
    {name:"Ramesh's Borewell", status:'ok', meta:'Functional · shared 3x this week', dist:'180m'},
    {name:'Municipal Tanker — Ward 4', status:'low', meta:'Running low · arrives ~5pm daily', dist:'350m'},
    {name:'Community Well, Temple Rd', status:'ok', meta:'Functional · open access', dist:'420m'},
    {name:"Savita's Borewell", status:'dry', meta:'Dry since Tue · not currently shareable', dist:'500m'},
  ];

  let entries = [
    {type:'lend', who:'Ramesh', amount:40, unit:'L', date:'2 days ago'},
    {type:'borrow', who:'Geeta', amount:25, unit:'L', date:'Yesterday'},
  ];
  let formType = 'lend';

  function statusLabel(s){
    return s === 'ok' ? 'Functional' : s === 'low' ? 'Running low' : 'Dry';
  }

  function render(){
    const balance = entries.reduce((sum,e)=> e.type==='lend' ? sum+e.amount : sum-e.amount, 0);
    root.innerHTML = `
      <div class="js-header">
        <div class="js-eyebrow">DHARTI · Water Scarcity &amp; Access</div>
        <div class="js-title">JalSetu</div>
        <div class="js-sub">A live map of working water sources and a shared ledger so neighbours can lend and borrow water fairly — no app literacy required.</div>
      </div>
      <div class="js-tabs">
        <div class="js-tab ${activeTab==='map'?'active':''}" data-tab="map">Nearby Water Sources</div>
        <div class="js-tab ${activeTab==='ledger'?'active':''}" data-tab="ledger">Water Ledger</div>
      </div>

      <div class="js-panel ${activeTab!=='map'?'hidden':''}">
        <div class="js-section-title">Reported by your community · updated live</div>
        ${sources.map(s=>`
          <div class="js-source-card">
            <div class="js-status-dot ${s.status}"></div>
            <div>
              <div class="js-source-name">${s.name}</div>
              <div class="js-source-meta">${statusLabel(s.status)} — ${s.meta}</div>
            </div>
            <div class="js-source-dist">${s.dist} away</div>
          </div>
        `).join('')}
        <button class="js-add-btn" id="js-report-btn">📍 Report a water source</button>
      </div>

      <div class="js-panel ${activeTab!=='ledger'?'hidden':''}">
        <div class="js-balance-banner">
          <div>
            <div class="js-balance-label">Your net balance</div>
            <div class="js-balance-num">${balance >= 0 ? '+' : ''}${balance} L</div>
          </div>
          <div style="font-size:12.5px; opacity:0.85; text-align:right; max-width:160px;">
            ${balance >= 0 ? "You're owed water by neighbours" : "You owe water to neighbours"}
          </div>
        </div>

        <div class="js-ledger-form">
          <div class="js-toggle-group" style="margin-bottom:12px;">
            <div class="js-toggle ${formType==='lend'?'sel-lend':''}" data-type="lend">I lent water</div>
            <div class="js-toggle ${formType==='borrow'?'sel-borrow':''}" data-type="borrow">I borrowed water</div>
          </div>
          <div class="js-form-row">
            <input type="text" id="js-who" placeholder="Neighbour's name" />
            <input type="number" id="js-amount" placeholder="Litres" min="1" />
          </div>
          <button class="js-add-btn" id="js-add-entry" style="width:100%; justify-content:center;">+ Add to ledger</button>
        </div>

        <div class="js-section-title">Recent activity</div>
        ${entries.length === 0 ? '<div class="js-empty">No entries yet. Add your first one above.</div>' :
          entries.slice().reverse().map(e=>`
            <div class="js-entry">
              <div class="js-entry-icon ${e.type}">${e.type==='lend'?'💧':'🪣'}</div>
              <div>
                <div class="js-entry-text">${e.type==='lend' ? `You lent water to <b>${e.who}</b>` : `You borrowed water from <b>${e.who}</b>`}</div>
                <div class="js-entry-date">${e.date}</div>
              </div>
              <div class="js-entry-amt ${e.type}">${e.type==='lend'?'+':'−'}${e.amount} L</div>
            </div>
          `).join('')
        }
      </div>
    `;
    attachEvents();
  }

  let activeTab = 'map';

  function attachEvents(){
    root.querySelectorAll('.js-tab').forEach(t=>{
      t.onclick = ()=>{ activeTab = t.dataset.tab; render(); };
    });
    root.querySelectorAll('.js-toggle').forEach(t=>{
      t.onclick = ()=>{ formType = t.dataset.type; render(); };
    });
    const reportBtn = root.querySelector('#js-report-btn');
    if (reportBtn) reportBtn.onclick = ()=>{
      sources.push({name:'New source you reported', status:'ok', meta:'Just reported by you', dist:'—'});
      render();
    };
    const addBtn = root.querySelector('#js-add-entry');
    if (addBtn) addBtn.onclick = ()=>{
      const who = root.querySelector('#js-who').value.trim();
      const amt = parseInt(root.querySelector('#js-amount').value, 10);
      if (!who || !amt) return;
      entries.push({type:formType, who, amount:amt, unit:'L', date:'Just now'});
      render();
    };
  }

  render();
})();
</script>
</div>
</body></html>
